name: Build and Release

# This workflow triggers whenever you push a tag that starts with "v" (e.g., v1.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release x86_64
    runs-on: ubuntu-latest

    # We need permission to write to the repository's releases
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install musl-tools
        # Required to compile statically linked binaries on Ubuntu
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare binary for upload
        run: |
          # Rename the binary so it's clear what architecture it's for
          mv target/x86_64-unknown-linux-musl/release/kerio_reset kerio_reset-x86_64-linux

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          # Automatically uses the tag name for the release version
          generate_release_notes: true
          files: kerio_reset-x86_64-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
